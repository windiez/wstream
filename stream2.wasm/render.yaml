services:
  - type: web
    name: voice-scheduling-agent
    env: python
    autoDeploy: true
    buildCommand: pip install -r stream2.wasm/requirements.txt
    startCommand: cd stream2.wasm && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o
      - key: LLM_TIMEOUT_S
        value: "30"
      - key: LLM_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
